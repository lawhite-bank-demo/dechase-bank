<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding-bottom:80px;
}

.container{max-width:420px;margin:auto;padding:20px;}

.card{
background:#111827;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.balance-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:25px;
border-radius:20px;
text-align:center;
}

.balance{font-size:28px;font-weight:bold;}

.bank-card{perspective:1000px;margin-top:10px;}
.card-inner{
width:100%;
height:180px;
position:relative;
transition:.6s;
transform-style:preserve-3d;
}
.card-inner.flipped{transform:rotateY(180deg);}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:16px;
padding:18px;
backface-visibility:hidden;
}

.card-front{
background:linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card-back{
background:#0f172a;
transform:rotateY(180deg);
}

.chip{
width:50px;height:36px;border-radius:8px;
background:linear-gradient(135deg,#e6c200,#bfa100);
}

.card-bottom{display:flex;justify-content:space-between;}

.bottomNav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#021a35;padding:10px;
}

.bottomNav button{background:none;color:white;font-size:12px;}

.hidden{display:none;}

input{
padding:12px;border-radius:10px;border:none;
background:#1f2937;color:white;margin-top:10px;width:100%;
}

button{
margin-top:10px;padding:12px;border:none;border-radius:10px;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<!-- TIME -->
<div>
<div id="greeting"></div>
<div id="time"></div>
<div id="date"></div>
</div>

<h3 id="welcome"></h3>

<!-- HOME -->
<div id="homePage">

<div class="balance-card">
<div>Total Balance</div>
<div id="balance" class="balance"></div>
<div id="toggleBalance">👁 Hide</div>
</div>

<div class="card">
<div class="bank-card" onclick="flipCard()">
<div class="card-inner" id="cardInner">

<div class="card-front">
<div style="display:flex;justify-content:space-between;">
<div class="chip"></div>
<div>VISA</div>
</div>

<div id="cardNumber"></div>

<div class="card-bottom">
<div>
<div>CARD HOLDER</div>
<div id="cardName"></div>
</div>
<div>
<div>EXPIRES</div>
<div id="cardExpiry"></div>
</div>
</div>
</div>

<div class="card-back">
<div style="margin-top:40px;text-align:right;">
CVV: <span id="cardCVV">***</span>
</div>
</div>

</div>
</div>

<button id="cardBtn" onclick="toggleCard()">Freeze Card</button>
</div>

<div class="card">
<b>🌍 Multi Currency Wallet</b>
<div>USD: <span id="usdWallet"></span></div>
<div>EUR: <span id="eurWallet"></span></div>
<div>GBP: <span id="gbpWallet"></span></div>
</div>

<div class="card">
<b>💱 Converted Balance</b>
<div>EUR: <span id="convertedEUR"></span></div>
<div>GBP: <span id="convertedGBP"></span></div>
</div>

<div class="card">
<button onclick="openPage('paymentsPage')">Send Money</button>
<button onclick="openPage('billsPage')">Pay Bills</button>
<button onclick="openPage('giftPage')">Gift Cards</button>
</div>

<div class="card">
<b>Account Details</b>
<div id="accountNumberDisplay"></div>
IBAN: <span id="iban"></span><br>
Routing: <span id="routingDisplay"></span><br>
SWIFT: <span id="swift"></span>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

</div>

<!-- SEND MONEY -->
<div id="paymentsPage" class="hidden">
<div class="card">
<b>💸 Send Money</b>
<input id="accountNumber" placeholder="Recipient Account">
<input id="amount" placeholder="€ Amount">
<button onclick="openPinModal()">Send Money</button>
</div>
</div>

<!-- BILLS -->
<div id="billsPage" class="hidden">
<div class="card">
<button onclick="payBill('Electricity',120)">Electricity</button>
<button onclick="payBill('Netflix',15)">Netflix</button>
</div>
</div>

<!-- GIFT -->
<div id="giftPage" class="hidden">
<div class="card">
<button onclick="buyGiftCard('Amazon',100)">Amazon</button>
<button onclick="buyGiftCard('Steam',25)">Steam</button>
</div>
</div>

<!-- PROFILE -->
<div id="profilePage" class="hidden">
<div class="card">
<h3 id="nameProfile"></h3>
<p id="emailProfile"></p>
</div>

<div class="card">
<button onclick="contactSupport()">Contact Support</button>
<button onclick="logout()">Logout</button>
</div>
</div>

</div>

<div class="bottomNav">
<button onclick="openPage('homePage')">Home</button>
<button onclick="openPage('paymentsPage')">Payments</button>
<button onclick="openPage('billsPage')">Bills</button>
<button onclick="openPage('giftPage')">Gift</button>
<button onclick="openPage('profilePage')">Profile</button>
</div>

<script>
function openPage(page){
["homePage","paymentsPage","billsPage","giftPage","profilePage"]
.forEach(p=>document.getElementById(p).classList.add("hidden"));
document.getElementById(page).classList.remove("hidden");
}

function flipCard(){
const card = document.getElementById("cardInner");
const cvv = document.getElementById("cardCVV");

card.classList.toggle("flipped");

cvv.innerText = card.classList.contains("flipped")
? window._realCVV
: "***";
}

function updateTime(){
const now = new Date();
document.getElementById("time").innerText = now.toLocaleTimeString();
document.getElementById("date").innerText = now.toDateString();
document.getElementById("greeting").innerText =
now.getHours()<12?"Good Morning":
now.getHours()<18?"Good Afternoon":"Good Evening";
}
setInterval(updateTime,1000);
updateTime();

function contactSupport(){
window.open("https://wa.me/13312016202");
}
</script>

<script type="module" src="dashboard.js?v=FINAL-CLEAN"></script>

</body>
</html>
