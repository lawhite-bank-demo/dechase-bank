<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding-bottom:80px;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.balance-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:25px;
border-radius:20px;
text-align:center;
margin-bottom:15px;
}

.balance{
font-size:28px;
font-weight:bold;
transition:0.3s;
}

/* 🔥 PREMIUM CARD */
.bank-card{perspective:1000px;margin-top:10px;}

.card-inner{
width:100%;
height:180px;
position:relative;
transition:.6s;
transform-style:preserve-3d;
}

.card-inner.flipped{transform:rotateY(180deg);}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:16px;
padding:18px;
backface-visibility:hidden;
}

.card-front{
background:linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
display:flex;
flex-direction:column;
justify-content:space-between;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card-back{
transform:rotateY(180deg);
background:#0f172a;
}

/* CARD DETAILS */
.card-top{
display:flex;
justify-content:space-between;
align-items:center;
}

/* 🔥 REALISTIC CHIP */
.chip{
width:50px;
height:36px;
border-radius:8px;
background:linear-gradient(135deg,#e6c200,#bfa100);
position:relative;
box-shadow:
inset 0 0 6px rgba(0,0,0,0.5),
0 2px 6px rgba(0,0,0,0.3);
}

.chip::before{
content:"";
position:absolute;
top:6px;
left:8px;
right:8px;
bottom:6px;
border:1px solid rgba(0,0,0,0.3);
border-radius:4px;
}

.chip::after{
content:"";
position:absolute;
top:50%;
left:0;
width:100%;
height:2px;
background:rgba(0,0,0,0.25);
transform:translateY(-50%);
}

/* VISA TEXT */
.visa{
font-weight:bold;
letter-spacing:3px;
font-size:18px;
}

/* NUMBER */
.card-number{
font-size:20px;
letter-spacing:4px;
font-weight:bold;
}

/* BOTTOM */
.card-bottom{
display:flex;
justify-content:space-between;
}

.label{
font-size:10px;
opacity:0.7;
}

.tx{
background:#1f2937;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#021a35;
padding:10px;
}

.bottomNav button{
background:none;
color:white;
font-size:12px;
}

.hidden{display:none !important;}

.account-box{
background:#0f172a;
padding:12px;
border-radius:10px;
font-size:14px;
margin-top:8px;
letter-spacing:2px;
color:#38bdf8;
font-weight:bold;
}

/* RECEIPT */
#receiptModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0009;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.receipt-box{
background:#0f172a;
padding:20px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<!-- TIME -->
<div style="margin-bottom:10px;">
<div id="greeting" style="font-size:13px;color:#9ca3af;"></div>
<div id="time" style="font-size:20px;font-weight:bold;"></div>
<div id="date" style="font-size:12px;color:#9ca3af;"></div>
</div>

<h3 id="welcome"></h3>

<div id="homePage">

<div class="balance-card">
<div>Total Balance</div>
<div id="balance" class="balance"></div>
<div id="toggleBalance">👁 Hide</div>
</div>

<div class="card">
<div class="bank-card" onclick="flipCard()">
<div class="card-inner" id="cardInner">

<div class="card-front">

<div class="card-top">
<div class="chip"></div>
<div class="visa">VISA</div>
</div>

<div id="cardNumber" class="card-number"></div>

<div class="card-bottom">
<div>
<div class="label">CARD HOLDER</div>
<div id="cardName"></div>
</div>

<div>
<div class="label">EXPIRES</div>
<div id="cardExpiry"></div>
</div>
</div>

</div>

<div class="card-back">
<div style="margin-top:40px;text-align:right;">
CVV: <span id="cardCVV"></span>
</div>
</div>

</div>
</div>

<button onclick="revealCVV()">👁 Show CVV</button>
<button id="cardBtn" onclick="toggleCard()">Freeze Card</button>
</div>

<!-- REST UNCHANGED -->
<!-- (I kept everything exactly same below to avoid bugs) -->

<div class="card">
<b>🌍 Multi Currency Wallet</b>
<div style="margin-top:10px;">
<div>EUR: <span id="usdWallet"></span></div>
<div>Converted EUR: <span id="eurWallet"></span></div>
<div>GBP: <span id="gbpWallet"></span></div>
</div>
</div>

<div class="card">
<b>💱 Converted Balance</b><br>
EUR: <span id="convertedEUR"></span><br>
GBP: <span id="convertedGBP"></span>
</div>

<div class="card">
<button onclick="openPage('paymentsPage')">💸 Send Money</button>
<button onclick="openPage('billsPage')">💡 Pay Bills</button>
<button onclick="openPage('giftPage')">🎁 Gift Cards</button>
</div>

<div class="card">
<b>Account Details</b><br>
<div class="account-box" id="accountNumberDisplay"></div>
IBAN: <span id="iban"></span><br>
Routing: <span id="routingDisplay"></span><br>
SWIFT: <span id="swift"></span><br>
Address: <span id="bankAddress"></span>
</div>

<div class="card">
<b>Pending Transfers</b>
<div id="pendingTransactions"></div>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

</div>

<!-- NAV + SCRIPT SAME -->
<script>
function openPage(page){
["homePage","paymentsPage","billsPage","giftPage","profilePage"]
.forEach(p=>document.getElementById(p).classList.add("hidden"));
document.getElementById(page).classList.remove("hidden");
}

function logout(){
localStorage.clear();
location.replace("index.html");
}

function contactSupport(){
window.open("https://wa.me/13312016202");
}

function flipCard(){
const card = document.getElementById("cardInner");
if(card) card.classList.toggle("flipped");
}

let cvvVisible = false;
function revealCVV(){
const cvv = document.getElementById("cardCVV");
if(!cvv) return;
cvvVisible = !cvvVisible;
cvv.innerText = cvvVisible ? cvv.innerText : "***";
}
</script>

<script type="module" src="dashboard.js?v=800"></script>

</body>
</html>
