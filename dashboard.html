<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding-bottom:80px;
}

.container{max-width:420px;margin:auto;padding:20px;}

.card{
background:#111827;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.balance-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:25px;
border-radius:20px;
text-align:center;
}

.balance{font-size:28px;font-weight:bold;}

/* ✅ FIXED CARD */
.bank-card{perspective:1000px;margin-top:10px;}

.card-inner{
width:100%;
height:180px;
position:relative;
transition:0.6s;
transform-style:preserve-3d;
}

.card-inner.flipped{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:16px;
padding:18px;
backface-visibility:hidden;
-webkit-backface-visibility:hidden;
}

.card-front{
background:linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card-back{
background:#0f172a;
transform:rotateY(180deg);
}

.card-top{display:flex;justify-content:space-between;}

.chip{
width:50px;
height:36px;
border-radius:8px;
background:linear-gradient(135deg,#e6c200,#bfa100);
box-shadow:0 2px 6px rgba(0,0,0,0.4);
}

.visa{
font-weight:bold;
letter-spacing:3px;
font-size:18px;
}

.card-number{
font-size:20px;
letter-spacing:4px;
font-weight:bold;
}

.card-bottom{
display:flex;
justify-content:space-between;
}

.label{
font-size:10px;
opacity:0.7;
}

/* NAV */
.bottomNav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#021a35;
padding:10px;
}

.bottomNav button{
background:none;
color:white;
font-size:12px;
}

.hidden{display:none !important;}

.account-box{
background:#0f172a;
padding:12px;
border-radius:10px;
margin-top:8px;
letter-spacing:2px;
color:#38bdf8;
font-weight:bold;
}

input{
padding:12px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
margin-top:8px;
width:100%;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
font-weight:bold;
}

/* PROFILE */
.profile-avatar{
width:80px;
height:80px;
border-radius:50%;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
margin:auto;
}

.logout-btn{background:linear-gradient(135deg,#ef4444,#dc2626);}
.upgrade-btn{background:linear-gradient(135deg,#22c55e,#16a34a);}

/* RECEIPT */
#receiptModal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#0009;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.receipt-box{
background:#0f172a;
padding:20px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div>
<div id="greeting"></div>
<div id="time"></div>
<div id="date"></div>
</div>

<div id="homeWelcome">
<h3 id="welcome"></h3>
</div>

<div id="homePage">

<div class="balance-card">
<div>Total Balance</div>
<div id="balance" class="balance"></div>
<div id="toggleBalance">👁 Hide</div>
</div>

<div class="card">
<div class="bank-card" onclick="flipCard()">
<div class="card-inner" id="cardInner">

<div class="card-front">
<div class="card-top">
<div class="chip"></div>
<div class="visa">VISA</div>
</div>

<div id="cardNumber" class="card-number"></div>

<div class="card-bottom">
<div>
<div class="label">CARD HOLDER</div>
<div id="cardName"></div>
</div>
<div>
<div class="label">EXPIRES</div>
<div id="cardExpiry"></div>
</div>
</div>
</div>

<div class="card-back">
<div style="margin-top:40px;text-align:right;font-size:18px;">
CVV: <span id="cardCVV">***</span>
</div>
</div>

</div>
</div>

<button onclick="revealCVV()">👁 Show CVV</button>
<button id="cardBtn" onclick="toggleCard()">Freeze Card</button>
</div>

<div class="card">
<b>🌍 Multi Currency Wallet</b>
<div>USD: <span id="usdWallet"></span></div>
<div>EUR: <span id="eurWallet"></span></div>
<div>GBP: <span id="gbpWallet"></span></div>
</div>

<div class="card">
<b>💱 Converted Balance</b>
<div>EUR: <span id="convertedEUR"></span></div>
<div>GBP: <span id="convertedGBP"></span></div>
</div>

<div class="card">
<button onclick="openPage('paymentsPage')">💸 Send Money</button>
<button onclick="openPage('billsPage')">💡 Pay Bills</button>
<button onclick="openPage('giftPage')">🎁 Gift Cards</button>
</div>

<div class="card">
<b>Account Details</b>
<div class="account-box" id="accountNumberDisplay"></div>
IBAN: <span id="iban"></span><br>
Routing: <span id="routingDisplay"></span><br>
SWIFT: <span id="swift"></span><br>
Address: <span id="bankAddress"></span>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

</div>

<!-- PROFILE -->
<div id="profilePage" class="hidden">

<div class="card" style="text-align:center;">
<div class="profile-avatar">👤</div>
<h3 id="nameProfile"></h3>
<p id="emailProfile"></p>
<p id="accountTier"></p>
<p id="accountLimit"></p>
</div>

<div class="card">
<button onclick="upgradeAccount()" class="upgrade-btn">⬆ Upgrade Account</button>
<button onclick="contactSupport()">📞 Contact Support</button>
<button onclick="logout()" class="logout-btn">🚪 Logout</button>
</div>

</div>

<!-- NAV -->
<div class="bottomNav">
<button onclick="openPage('homePage')">Home</button>
<button onclick="openPage('profilePage')">Profile</button>
</div>

<script>
function openPage(page){
["homePage","profilePage"].forEach(p=>{
let el=document.getElementById(p);
if(el) el.classList.add("hidden");
});
document.getElementById(page).classList.remove("hidden");
}

function flipCard(){
document.getElementById("cardInner").classList.toggle("flipped");
}

/* ✅ FIXED CVV */
let cvvVisible=false;
function revealCVV(){
const cvv=document.getElementById("cardCVV");

if(!cvv) return;

cvvVisible=!cvvVisible;

cvv.innerText = cvvVisible ? (window._realCVV || "123") : "***";
}
</script>

<script type="module" src="dashboard.js?v=FINAL"></script>

</body>
</html>
