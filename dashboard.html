<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(160deg,#020617,#031427,#021a35);
  color:white;
}
.container{max-width:420px;margin:auto;padding:20px;}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:16px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.06);
}

.balance-card{
  background:linear-gradient(135deg,#3aa0ff,#6ed0ff);
  border-radius:20px;
  padding:22px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.balance{font-size:34px;font-weight:700;}
.eye{margin-top:6px;font-size:14px;cursor:pointer;}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2d8cff;
  color:white;
  font-weight:600;
}

.green{color:#00ffb2;}
.red{color:#ff6b6b;}
.small{font-size:12px;opacity:.7;}
</style>
</head>
<body>

<div class="container">

<h3 id="welcome">Loading...</h3>

<!-- BALANCE -->
<div class="balance-card">
  <div class="balance" id="balance">€0</div>
  <div class="eye" id="toggleBalance">👁 Hide balance</div>
</div>

<!-- ACCOUNT INFO -->
<div class="card">
<b>Account Info</b><br>
Name: <span id="name">-</span><br>
Account: <span id="acc">-</span><br>
IBAN: <span id="iban">-</span><br>
SWIFT: <span id="swift">-</span>
<div id="freezeNotice"></div>
</div>

<!-- QUICK ACTIONS -->
<div class="card">
<b>Quick Actions</b>
<div class="grid">
  <button onclick="showTransfer()">Send</button>
  <button onclick="showBills()">Pay Bills</button>
  <button onclick="showGift()">Gift Cards</button>
  <button onclick="alert('Withdraw coming')">Withdraw</button>
  <button onclick="alert('Deposit coming')">Deposit</button>
  <button onclick="location.reload()">Refresh</button>
</div>
</div>

<!-- TRANSFER -->
<div class="card" id="transferBox" style="display:none;">
<b>Send Money</b>
<input id="receiver" placeholder="Username or IBAN">
<input id="amount" type="number" placeholder="Amount">
<button onclick="askPin()">Send</button>
</div>

<!-- PAY BILLS -->
<div class="card" id="billBox" style="display:none;">
<b>Pay Bills</b>
<select id="billType">
<option>Electricity</option>
<option>Water</option>
<option>Internet</option>
<option>TV Subscription</option>
</select>
<input id="billAmount" type="number" placeholder="Amount">
<button onclick="payBill()">Pay</button>
</div>

<!-- GIFT CARDS -->
<div class="card" id="giftBox" style="display:none;">
<b>Buy Gift Card</b>
<select id="giftType">
<option>Amazon</option>
<option>iTunes</option>
<option>Steam</option>
<option>Google Play</option>
</select>
<input id="giftAmount" type="number" placeholder="Amount">
<button onclick="buyGift()">Buy</button>
</div>

<!-- TRANSACTIONS -->
<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

<button onclick="logout()" style="background:#ff4d4d">Logout</button>

</div>

<!-- PIN MODAL -->
<div id="pinModal" style="position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;">
 <div style="background:#0a223d;padding:25px;border-radius:15px;width:85%;max-width:320px;text-align:center;">
   <h3>Enter PIN</h3>
   <input id="pinInput" type="password">
   <button onclick="confirmTransfer()">Confirm</button>
   <button onclick="closePin()" style="background:#555;margin-top:6px;">Cancel</button>
 </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyBDp6wmJMY8WPyKPNE-bvVSiz4AIUbn71U",
 authDomain:"dechase-bank.firebaseapp.com",
 projectId:"dechase-bank"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 CHECK LOGIN
const username = localStorage.getItem("user");
if(!username) location.href="index.html";

// LOAD USER
const userRef = doc(db,"users",username);
const snap = await getDoc(userRef);
if(!snap.exists()){
 alert("User not found");
 location.href="index.html";
}

const data = snap.data();

// DISPLAY INFO
welcome.innerText="Hello, "+(data.fullName || username);
name.innerText=data.fullName || "-";
acc.innerText=data.accountNumber || "-";
iban.innerText=data.iban || "-";
swift.innerText=data.swift || "-";

let balanceValue = Number(data.balance || 0);
let hidden=false;

function renderBalance(){
 balance.innerText = hidden ? "••••••" : "€"+balanceValue.toLocaleString();
 toggleBalance.innerText = hidden ? "👁 Show balance" : "👁 Hide balance";
}
toggleBalance.onclick=()=>{hidden=!hidden;renderBalance();}
renderBalance();

// TRANSACTIONS
const box=document.getElementById("transactions");
if(data.transactions){
 data.transactions.slice().reverse().forEach(tx=>{
   const color = tx.amount>0 ? "green":"red";
   box.innerHTML+=`
     <div class="${color}">
     ${tx.note} (€${Math.abs(tx.amount).toLocaleString()})
     <div class="small">${tx.date||""}</div>
     </div>`;
 });
}

// SHOW SECTIONS
window.showTransfer=()=>transferBox.style.display="block";
window.showBills=()=>billBox.style.display="block";
window.showGift=()=>giftBox.style.display="block";

// PIN TRANSFER
let transferData=null;

window.askPin=()=>{
 transferData={
  receiver:receiver.value.trim(),
  amount:parseFloat(amount.value)
 };
 if(!transferData.receiver||!transferData.amount) return alert("Fill fields");
 pinModal.style.display="flex";
}

window.closePin=()=>pinModal.style.display="none";

window.confirmTransfer=async()=>{
 if(pinInput.value!==data.pin) return alert("Wrong PIN");

 const users=await getDocs(collection(db,"users"));
 let receiverName=null,receiverData=null;

 users.forEach(d=>{
  if(d.id===transferData.receiver || d.data().iban===transferData.receiver){
    receiverName=d.id;
    receiverData=d.data();
  }
 });

 if(!receiverName) return alert("Receiver not found");
 if(balanceValue<transferData.amount) return alert("Insufficient funds");

 const date=new Date().toLocaleString();

 await updateDoc(userRef,{
  balance:balanceValue-transferData.amount,
  transactions:[...(data.transactions||[]),
   {amount:-transferData.amount,note:"Sent to "+receiverName,date}]
 });

 await updateDoc(doc(db,"users",receiverName),{
  balance:Number(receiverData.balance||0)+transferData.amount,
  transactions:[...(receiverData.transactions||[]),
   {amount:transferData.amount,note:"Received from "+username,date}]
 });

 alert("Transfer successful");
 location.reload();
};

// PAY BILL
window.payBill=async()=>{
 const type=billType.value;
 const amt=parseFloat(billAmount.value);
 if(!amt) return alert("Enter amount");
 if(balanceValue<amt) return alert("Insufficient funds");

 const date=new Date().toLocaleString();

 await updateDoc(userRef,{
  balance:balanceValue-amt,
  transactions:[...(data.transactions||[]),
   {amount:-amt,note:type+" bill paid",date}]
 });

 alert(type+" paid successfully");
 location.reload();
}

// GIFT CARD
window.buyGift=async()=>{
 const type=giftType.value;
 const amt=parseFloat(giftAmount.value);
 if(!amt) return alert("Enter amount");
 if(balanceValue<amt) return alert("Insufficient funds");

 const date=new Date().toLocaleString();

 await updateDoc(userRef,{
  balance:balanceValue-amt,
  transactions:[...(data.transactions||[]),
   {amount:-amt,note:type+" gift card",date}]
 });

 alert(type+" gift card purchased");
 location.reload();
}

window.logout=()=>{
 localStorage.removeItem("user");
 location.href="index.html";
}
</script>
</body>
</html>
