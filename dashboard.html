<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;padding-bottom:80px;}
.container{max-width:420px;margin:auto;padding:20px;}

.card{background:#111827;padding:15px;border-radius:15px;margin-bottom:15px;}

.balance-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:25px;border-radius:20px;text-align:center;margin-bottom:15px;
}
.balance{font-size:28px;font-weight:bold;transition:0.3s;}

.bank-card{perspective:1000px;margin-top:10px;}
.card-inner{width:100%;height:180px;position:relative;transition:.6s;transform-style:preserve-3d;}
.card-inner.flipped{transform:rotateY(180deg);}
.card-front,.card-back{position:absolute;width:100%;height:100%;border-radius:16px;padding:18px;backface-visibility:hidden;}
.card-front{background:linear-gradient(135deg,#1e40af,#0284c7);}
.card-back{transform:rotateY(180deg);background:#0f172a;}

.tx{background:#1f2937;padding:10px;border-radius:10px;margin-top:10px;}

.bottomNav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#021a35;padding:10px;
}
.bottomNav button{background:none;color:white;font-size:12px;}

.hidden{display:none !important;}

.account-box{
background:#0f172a;
padding:12px;
border-radius:10px;
font-size:14px;
margin-top:8px;
letter-spacing:2px;
color:#38bdf8;
font-weight:bold;
}

/* RECEIPT */
#receiptModal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#0009;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.receipt-box{
background:#0f172a;
padding:20px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<!-- TIME -->
<div style="margin-bottom:10px;">
  <div id="greeting" style="font-size:13px;color:#9ca3af;"></div>
  <div id="time" style="font-size:20px;font-weight:bold;"></div>
  <div id="date" style="font-size:12px;color:#9ca3af;"></div>
</div>

<h3 id="welcome"></h3>

<div id="homePage">

<div class="balance-card">
<div>Total Balance</div>
<div id="balance" class="balance"></div>
<div id="toggleBalance">👁 Hide</div>
</div>

<div class="card">
<div class="bank-card" onclick="flipCard()">
<div class="card-inner" id="cardInner">

<div class="card-front">
<div id="cardNumber"></div>
<div id="cardName"></div>
<div>EXP: <span id="cardExpiry"></span></div>
</div>

<div class="card-back">
CVV: <span id="cardCVV"></span>
</div>

</div>
</div>

<button onclick="revealCVV()">👁 Show CVV</button>
<button id="cardBtn" onclick="toggleCard()">Freeze Card</button>
</div>

<!-- 🔥 NEW MULTI CURRENCY UI -->
<div class="card">
<b style="font-size:16px;">🌍 Multi Currency Wallet</b>

<div style="margin-top:12px;display:flex;flex-direction:column;gap:10px;">

<div style="background:linear-gradient(135deg,#1e40af,#2563eb);padding:12px;border-radius:12px;">
<div style="font-size:12px;opacity:0.8;">🇪🇺 Euro Balance</div>
<div id="usdWallet" style="font-size:18px;font-weight:bold;"></div>
</div>

<div style="background:#1f2937;padding:12px;border-radius:12px;">
<div style="font-size:12px;opacity:0.7;">Converted EUR</div>
<div id="eurWallet" style="font-size:16px;font-weight:bold;"></div>
</div>

<div style="background:linear-gradient(135deg,#0ea5e9,#06b6d4);padding:12px;border-radius:12px;">
<div style="font-size:12px;opacity:0.8;">🇬🇧 Pound Balance</div>
<div id="gbpWallet" style="font-size:18px;font-weight:bold;"></div>
</div>

</div>
</div>

<!-- 🔥 NEW CONVERTED UI -->
<div class="card">
<b style="font-size:16px;">💱 Converted Balance</b>

<div style="display:flex;justify-content:space-between;margin-top:10px;">
<div>
<div style="font-size:12px;opacity:0.7;">EUR</div>
<div id="convertedEUR" style="font-weight:bold;"></div>
</div>

<div>
<div style="font-size:12px;opacity:0.7;">GBP</div>
<div id="convertedGBP" style="font-weight:bold;"></div>
</div>
</div>
</div>

<div class="card">
<button onclick="openPage('paymentsPage')">💸 Send Money</button>
<button onclick="openPage('billsPage')">💡 Pay Bills</button>
<button onclick="openPage('giftPage')">🎁 Gift Cards</button>
</div>

<div class="card">
<b>Account Details</b><br>
<div class="account-box" id="accountNumberDisplay"></div>
IBAN: <span id="iban"></span><br>
Routing: <span id="routingDisplay"></span><br>
SWIFT: <span id="swift"></span><br>
Address: <span id="bankAddress"></span>
</div>

<div class="card">
<b>Pending Transfers</b>
<div id="pendingTransactions"></div>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

</div>

<!-- RECEIPT -->
<div id="receiptModal" class="hidden">
<div class="receipt-box">
<h3>Transaction Receipt</h3>
<p id="rType"></p>
<p id="rAmount"></p>
<p id="rAccount"></p>
<p id="rRef"></p>
<p id="rDate"></p>
<p style="color:#22c55e;">Status: Successful</p>
<button onclick="closeReceipt()">Done</button>
</div>
</div>

<div class="bottomNav">
<button onclick="openPage('homePage')">Home</button>
<button onclick="openPage('paymentsPage')">Payments</button>
<button onclick="openPage('billsPage')">Bills</button>
<button onclick="openPage('giftPage')">Gift</button>
<button onclick="openPage('profilePage')">Profile</button>
</div>

<script>
function openPage(page){
["homePage","paymentsPage","billsPage","giftPage","profilePage"]
.forEach(p=>document.getElementById(p).classList.add("hidden"));
document.getElementById(page).classList.remove("hidden");
}

function logout(){
localStorage.clear();
location.replace("index.html");
}

function contactSupport(){
window.open("https://wa.me/13312016202");
}

function flipCard(){
const card = document.getElementById("cardInner");
if(card) card.classList.toggle("flipped");
}

let cvvVisible = false;
function revealCVV(){
const cvv = document.getElementById("cardCVV");
if(!cvv) return;
cvvVisible = !cvvVisible;
cvv.innerText = cvvVisible ? cvv.innerText : "***";
}
</script>

<script type="module" src="dashboard.js?v=500"></script>

</body>
</html>
