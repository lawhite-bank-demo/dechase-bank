<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(160deg,#020617,#031427,#021a35);
color:white;
padding-bottom:80px;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
border-radius:18px;
padding:16px;
margin-bottom:15px;
border:1px solid rgba(255,255,255,0.06);
}

.balance-card{
background:linear-gradient(135deg,#3aa0ff,#6ed0ff);
border-radius:20px;
padding:22px;
text-align:center;
margin-bottom:15px;
}

.balance{
font-size:34px;
font-weight:700;
}

.eye{
margin-top:6px;
font-size:14px;
cursor:pointer;
}

button,input,select{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-top:8px;
}

button{
background:#2d8cff;
color:white;
font-weight:600;
}

.small{font-size:12px;opacity:.8;}

.bank-card{
background:linear-gradient(135deg,#0a1f44,#1d4ed8);
border-radius:16px;
padding:18px;
margin-bottom:10px;
}

.card-number{
font-size:22px;
letter-spacing:3px;
margin:20px 0;
}

.card-bottom{
display:flex;
justify-content:space-between;
font-size:14px;
}

.freezeBtn{
background:#ff3b3b;
}

#transactions div{
background:#0d2b4a;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#021a35;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid rgba(255,255,255,0.1);
}

.bottomNav button{
background:none;
border:none;
color:white;
font-size:14px;
}

</style></head><body><div class="container"><h3 id="welcome">Loading...</h3><!-- ================= HOME PAGE ================= --><div id="homePage"><div class="balance-card">
<div class="balance" id="balance">€0</div>
<div class="eye" id="toggleBalance">👁 Hide balance</div>
</div><div class="card">
<b>Account Info</b><br>
Name: <span id="name">-</span><br>
Account: <span id="acc">-</span><br>
IBAN: <span id="iban">-</span><br>
SWIFT: <span id="swift">-</span>
</div><div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div></div><!-- ================= CARDS PAGE ================= --><div id="cardsPage" style="display:none"><div class="bank-card"><div style="text-align:right;font-weight:bold;" id="cardType">VISA</div><div class="card-number" id="cardNumber">
0000 0000 0000 0000
</div><div class="card-bottom"><div>
<div class="small">Card Holder</div>
<div id="cardName">---</div>
</div><div>
<div class="small">Expiry</div>
<div id="cardExpiry">--/--</div>
</div><div>
<div class="small">CVV</div>
<div id="cardCVV">***</div>
</div></div></div><button onclick="toggleCard()" class="freezeBtn">
Freeze / Unfreeze Card
</button></div><!-- ================= PAYMENTS PAGE ================= --><div id="paymentsPage" style="display:none"><div class="card"><input id="receiver" placeholder="Account Number or IBAN">
<div id="receiverName" class="small"></div><input id="amount" type="number" placeholder="Amount (€)"><button onclick="askPin()">Send Transfer</button>

</div><div class="card"><select id="billType">
<option>Electricity</option>
<option>Water</option>
<option>Internet</option>
<option>TV Subscription</option>
<option>Government Fee</option>
</select><input id="billAmount" placeholder="Amount (€)"><button onclick="payBill()">Pay Bill</button>

</div></div><!-- ================= PROFILE PAGE ================= --><div id="profilePage" style="display:none"><div class="card"><b>User Profile</b><br><br>

Name: <span id="nameProfile">-</span><br>
Email: <span id="emailProfile">-</span>

</div><button onclick="logout()" style="background:#ff4d4d">
Logout
</button><button onclick="contactSupport()" style="background:#25D366;margin-top:10px;">
💬 Contact Bank Support
</button></div></div><!-- SUCCESS BANNER --><div id="successBanner" style="
display:none;
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
color:white;
padding:14px 22px;
border-radius:8px;
font-weight:bold;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
z-index:9999;">
✅ Transaction Successful
</div><!-- BOTTOM NAVIGATION --><div class="bottomNav"><button onclick="openPage('homePage')">Home</button>
<button onclick="openPage('cardsPage')">Cards</button>
<button onclick="openPage('paymentsPage')">Payments</button>
<button onclick="openPage('profilePage')">Profile</button>

</div><script type="module" src="dashboard.js"></script><script>

function openPage(page){

document.getElementById("homePage").style.display="none";
document.getElementById("cardsPage").style.display="none";
document.getElementById("paymentsPage").style.display="none";
document.getElementById("profilePage").style.display="none";

document.getElementById(page).style.display="block";

}

function contactSupport(){
const phone="14237960225";
const msg=encodeURIComponent("Hello DeChase Bank Support, I need help.");
window.open(`https://wa.me/${phone}?text=${msg}`,"_blank");
}

</script>
</body>
</html>
