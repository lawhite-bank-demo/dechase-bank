<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<style>
#cardBtn{
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
  background: linear-gradient(135deg,#ef4444,#dc2626);
  color: white;
  font-weight: bold;
}

/* NEW wrapper for spacing */
.card-btn-wrapper{
  margin-top: 20px;
}

.time-card{
  background: linear-gradient(135deg, #0ea5e9, #2563eb);
  padding: 20px;
  border-radius: 18px;
  margin-bottom: 15px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.greeting{font-size:14px;opacity:.9;margin-bottom:5px;}
.time{font-size:32px;font-weight:bold;}
.date{font-size:14px;opacity:.8;margin-top:5px;}

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding-bottom:80px;
}

.container{max-width:420px;margin:auto;padding:20px;}

.card{
background:#111827;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.balance-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:25px;
border-radius:20px;
text-align:center;
}

.balance{font-size:28px;font-weight:bold;}

.bank-card{perspective:1000px;margin-top:10px;}

/* ✅ FIXED PROPERLY */
.card-inner{
  width:100%;
  height:200px;
  position:relative;
  transition:.6s;
  transform-style:preserve-3d;
}

.card-inner.flipped{transform:rotateY(180deg);}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:16px;
padding:18px;
backface-visibility:hidden;
}

.card-front{
background:linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card-back{
background:#0f172a;
transform:rotateY(180deg);
}

.chip{
width:50px;height:36px;border-radius:8px;
background:linear-gradient(135deg,#ffd700,#bfa100);
}

.card-number{font-size:20px;letter-spacing:3px;font-weight:bold;}
.card-bottom{display:flex;justify-content:space-between;}

.bottomNav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#021a35;padding:10px;
}

.bottomNav button{background:none;color:white;font-size:12px;}

.hidden{display:none;}

input, select{
padding:12px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
margin-top:10px;
width:100%;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
font-weight:bold;
width:100%;
cursor:pointer;
}

.profile-avatar{
width:70px;height:70px;border-radius:50%;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
display:flex;align-items:center;justify-content:center;
margin:auto;font-size:28px;
}

.center{text-align:center;}

.tx{
padding:10px;
border-bottom:1px solid #1f2937;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- TIME -->
<div class="time-card">
  <div id="greeting"></div>
  <div id="time"></div>
  <div id="date"></div>
</div>

<h3 id="welcome"></h3>

<!-- HOME -->
<div id="homePage">

<div class="balance-card">
<div>Total Balance</div>
<div id="balance"></div>
<div id="toggleBalance">👁 Hide</div>
</div>

<div class="card">

<div class="bank-card" onclick="flipCard()">
<div class="card-inner" id="cardInner">

<div class="card-front">
<div style="display:flex;justify-content:space-between;">
<div class="chip"></div>
<div>VISA</div>
</div>

<div id="cardNumber" class="card-number"></div>

<div class="card-bottom">
<div>
<div>CARD HOLDER</div>
<div id="cardName"></div>
</div>
<div>
<div>EXPIRES</div>
<div id="cardExpiry"></div>
</div>
</div>
</div>

<div class="card-back">
<div style="margin-top:40px;text-align:right;">
CVV: <span id="cardCVV">***</span>
</div>
</div>

</div>
</div>

<!-- ✅ CLEAN FIX -->
<div class="card-btn-wrapper">
  <button id="cardBtn" onclick="toggleCard()">Freeze Card</button>
</div>

</div>

<!-- WALLET -->
<div class="card">
<b>🌍 Multi Currency Wallet</b>
<div>USD: <span id="usdWallet"></span></div>
<div>EUR: <span id="eurWallet"></span></div>
<div>GBP: <span id="gbpWallet"></span></div>
</div>

</div>

</div>

<script>
function flipCard(){
const card = document.getElementById("cardInner");
const cvv = document.getElementById("cardCVV");

card.classList.toggle("flipped");

cvv.innerText = card.classList.contains("flipped")
? window._realCVV
: "***";
}
</script>

<script type="module" src="dashboard.js?v=FINAL-CLEAN"></script>

</body>
</html>
