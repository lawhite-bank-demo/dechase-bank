<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeChase Bank</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding-bottom:80px;
}

.container{max-width:420px;margin:auto;padding:20px;}

.card{
background:#111827;
padding:15px;
border-radius:15px;
margin-bottom:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-2px);
}

.balance-card{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:25px;
border-radius:20px;
text-align:center;
}

.balance{font-size:28px;font-weight:bold;}

.time-card{
background:linear-gradient(135deg,#0ea5e9,#2563eb);
padding:20px;
border-radius:18px;
margin-bottom:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.time{font-size:32px;font-weight:bold;}

.bank-card{perspective:1000px;margin-top:10px;}

.card-inner{
width:100%;
height:200px;
position:relative;
transition:.6s;
transform-style:preserve-3d;
}

.card-inner.flipped{transform:rotateY(180deg);}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:16px;
padding:18px;
backface-visibility:hidden;
}

.card-front{
background:linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card-back{
background:#0f172a;
transform:rotateY(180deg);
}

.chip{
width:50px;height:36px;border-radius:8px;
background:linear-gradient(135deg,#ffd700,#bfa100);
}

.card-number{
font-size:20px;
letter-spacing:3px;
font-weight:bold;
}

.card-bottom{display:flex;justify-content:space-between;}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
color:white;
font-weight:bold;
width:100%;
cursor:pointer;
}

button:active{
transform:scale(0.96);
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#021a35;
padding:10px;
}

.bottomNav button{
background:none;
font-size:12px;
}

.hidden{display:none;}

input, select{
padding:12px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
margin-top:10px;
width:100%;
}

.profile-avatar{
width:70px;height:70px;
border-radius:50%;
background:linear-gradient(135deg,#2563eb,#0ea5e9);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:28px;
}

.center{text-align:center;}

.tx{
padding:10px;
border-bottom:1px solid #1f2937;
margin-top:10px;
cursor:pointer;
}

/* WhatsApp Button */
.whatsapp-btn{
position:fixed;
bottom:90px;
right:15px;
width:55px;
height:55px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
text-decoration:none;
color:white;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
z-index:999;
}
/* Logout Button */
.logoutBtn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#ef4444,#dc2626) !important;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.logoutBtn:active{
transform:scale(0.96);
}
</style>
</head>

<body>

<div class="container">

<!-- TIME -->
<div class="time-card">
<div id="greeting"></div>
<div id="time" class="time"></div>
<div id="date"></div>
</div>

<h3 id="welcome"></h3>

<!-- HOME -->
<div id="homePage">

<div class="balance-card">
<div>Total Balance</div>
<div id="balance" class="balance"></div>
<div id="toggleBalance" onclick="toggleBalance()">👁 Hide</div>
</div>

<div class="card">
<div class="bank-card" onclick="flipCard()">
<div class="card-inner" id="cardInner">

<div class="card-front">
<div style="display:flex;justify-content:space-between;">
<div class="chip"></div>
<div>VISA</div>
</div>

<div id="cardNumber" class="card-number"></div>

<div class="card-bottom">
<div>
<div>CARD HOLDER</div>
<div id="cardName"></div>
</div>
<div>
<div>EXPIRES</div>
<div id="cardExpiry"></div>
</div>
</div>
</div>

<div class="card-back">
<div style="margin-top:40px;text-align:right;">
CVV: <span id="cardCVV">***</span>
</div>
</div>

</div>
</div>
</div>

<button id="cardBtn" onclick="toggleCard()">Freeze Card</button>

<!-- WALLET -->
<div class="card">
<b>🌍 Multi Currency Wallet</b>
<div>USD: <span id="usdWallet"></span></div>
<div>EUR: <span id="eurWallet"></span></div>
<div>GBP: <span id="gbpWallet"></span></div>
</div>

<div class="card">
<b>💱 Converted Balance</b>
<div>EUR: <span id="convertedEUR"></span></div>
<div>USD: <span id="convertedUSD"></span></div>
<div>GBP: <span id="convertedGBP"></span></div>
</div>

<div class="card">
<button onclick="openPage('paymentsPage')">Send Money</button>
<button onclick="openPage('billsPage')">Pay Bills</button>
<button onclick="openPage('giftPage')">Gift Cards</button>
</div>

<div class="card">
<b>Account Details</b>
<div id="accountNumberDisplay"></div>
IBAN: <span id="iban"></span><br>
Routing: <span id="routingDisplay"></span><br>
SWIFT: <span id="swift"></span>
</div>

<div class="card">
<b>Transactions</b>
<div id="transactions"></div>
</div>

</div>

<!-- SEND -->
<div id="paymentsPage" class="hidden">
<div class="card">
<b>💸 Send Money</b>
<input id="ibanInput" placeholder="Recipient IBAN">
<input id="swiftInput" placeholder="SWIFT">
<input id="description" placeholder="Reference">

<select id="category">
<option>Personal</option>
<option>Bills</option>
<option>Business</option>
</select>

<input id="amount" placeholder="€ Amount">
<button onclick="openPinModal()">Send Transfer</button>
</div>
</div>

<!-- BILLS -->
<div id="billsPage" class="hidden">
<div class="card">
<b>Pay Bills</b>
<button onclick="payBill('Electricity',120)">Electricity €120</button>
<button onclick="payBill('Netflix',15)">Netflix €15</button>
</div>
</div>

<!-- GIFT -->
<div id="giftPage" class="hidden">
<div class="card">
<b>Gift Cards</b>
<button onclick="buyGiftCard('Amazon',100)">Amazon €100</button>
<button onclick="buyGiftCard('Steam',25)">Steam €25</button>
</div>
</div>

<!-- PROFILE -->
<div id="profilePage" class="hidden">

<div class="card center">
<div class="profile-avatar">👤</div>
<h3 id="nameProfile"></h3>
<p id="emailProfile"></p>
<p id="addressProfile"></p>
<p id="accountTier"></p>
<p id="accountLimit"></p>
</div>

<!-- ✅ Logout Button inside profile -->
<div class="card">
<button onclick="logoutUser()" class="logoutBtn">
🚪 Logout
</button>
</div>

</div>

<!-- NAV -->
<div class="bottomNav">
<button onclick="openPage('homePage')">Home</button>
<button onclick="openPage('paymentsPage')">Payments</button>
<button onclick="openPage('billsPage')">Bills</button>
<button onclick="openPage('giftPage')">Gift</button>
<button onclick="openPage('profilePage')">Profile</button>
</div>

<!-- WhatsApp -->
<a href="https://wa.me/13312016202" class="whatsapp-btn">💬</a>

<script>
function openPage(p){
  ["homePage","paymentsPage","billsPage","giftPage","profilePage"]
  .forEach(x=>{
    const el = document.getElementById(x);
    if(el) el.classList.add("hidden");
  });

  const page = document.getElementById(p);
  if(page) page.classList.remove("hidden");
}
// ✅ PRELOAD WALLET (FIX BLANK VALUES)
window.addEventListener("DOMContentLoaded", () => {
  const ids = [
    "usdWallet","eurWallet","gbpWallet",
    "convertedEUR","convertedUSD","convertedGBP"
  ];

  ids.forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.innerText = "...";
  });
});

function flipCard(){
const card = document.getElementById("cardInner");
const cvv = document.getElementById("cardCVV");

card.classList.toggle("flipped");
cvv.innerText = card.classList.contains("flipped") ? window._realCVV : "***";
}

function updateTime(){
const now = new Date();
document.getElementById("time").innerText = now.toLocaleTimeString();
document.getElementById("date").innerText = now.toDateString();
document.getElementById("greeting").innerText =
now.getHours()<12?"Good Morning":
now.getHours()<18?"Good Afternoon":"Good Evening";
}
setInterval(updateTime,1000);
updateTime();
</script>

<script type="module" src="dashboard.js"></script>

</body>
</html>
