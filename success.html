<!DOCTYPE html>
<html>
<head>
<title>Transfer Successful</title>

<!-- ✅ jsPDF MUST be loaded BEFORE your script -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family: Arial;
background:#0b1220;
color:white;
text-align:center;
padding:40px;
}
.card{
background:#111827;
padding:20px;
border-radius:12px;
max-width:400px;
margin:auto;
}
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>✅ Transfer Successful</h2>

<p id="type"></p>
<p id="amount"></p>
<p id="ref"></p>
<p id="date"></p>

<button onclick="downloadReceipt()">Download Receipt</button>
<button onclick="goHome()">Back to Dashboard</button>
</div>

<script>
const data = JSON.parse(localStorage.getItem("lastReceipt") || "{}");

// ✅ fallback (prevents blank screen)
if(!data || !data.amount){
document.getElementById("type").innerText = "No recent transaction";
}else{
document.getElementById("type").innerText = data.type || "";
document.getElementById("amount").innerText = "Amount: €" + (data.amount || 0);
document.getElementById("ref").innerText = "Ref: " + (data.reference || "-");
document.getElementById("date").innerText = data.date || "";
}

// ✅ REAL PDF RECEIPT
function downloadReceipt(){
const { jsPDF } = window.jspdf;

const doc = new jsPDF();

doc.setFontSize(18);
doc.text("TRANSFER RECEIPT", 20, 20);

doc.setFontSize(12);
doc.text(`Type: ${data.type || "-"}`, 20, 40);
doc.text(`Amount: €${data.amount || 0}`, 20, 50);
doc.text(`Reference: ${data.reference || "-"}`, 20, 60);
doc.text(`Date: ${data.date || "-"}`, 20, 70);

doc.save("receipt.pdf");
}

// BACK
function goHome(){
window.location.href = "dashboard.html";
}
</script>

</body>
</html>
