<!DOCTYPE html>
<html>
<head>
<title>Transfer Successful</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:#111827;
  padding:25px;
  border-radius:16px;
  width:360px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
  text-align:center;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  opacity:0.6;
  font-size:13px;
  margin-bottom:15px;
}

.amount{
  color:#22c55e;
  font-size:26px;
  text-align:center;
  margin:15px 0;
  font-weight:bold;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  padding:10px;
  background:#1f2937;
  border-radius:8px;
}

.label{
  opacity:0.7;
}

.value{
  font-weight:bold;
  text-align:right;
}

.buttons{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>

</head>

<body>

<div class="card">
  <h2>✅ Transfer Successful</h2>
  <div class="sub">Your payment has been processed</div>

  <div class="amount" id="amount"></div>

  <div class="row">
    <span class="label">Type</span>
    <span class="value" id="type"></span>
  </div>

  <div class="row">
    <span class="label">Category</span>
    <span class="value" id="category"></span>
  </div>

  <div class="row">
    <span class="label">Reference</span>
    <span class="value" id="ref"></span>
  </div>

  <div class="row">
    <span class="label">Date</span>
    <span class="value" id="date"></span>
  </div>

  <div class="buttons">
    <button onclick="downloadReceipt()">Download Receipt</button>
    <button onclick="goHome()">Back to Dashboard</button>
  </div>
</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const data = JSON.parse(localStorage.getItem("lastReceipt") || "{}");

// SAFE FALLBACKS
const type = data.type || "Transfer";
const amount = Number(data.amount || 0);
const ref = data.reference || "N/A";
const date = data.date || new Date().toLocaleString();
const category = data.category || "General";

// DISPLAY
document.getElementById("type").innerText = type;
document.getElementById("amount").innerText = "€" + amount.toLocaleString();
document.getElementById("ref").innerText = ref;
document.getElementById("date").innerText = date;
document.getElementById("category").innerText = category;

// DOWNLOAD PDF
function downloadReceipt(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("DeChase Bank", 20, 20);

  doc.setFontSize(14);
  doc.text("Transaction Receipt", 20, 30);

  doc.setFontSize(12);
  doc.text("Type: " + type, 20, 50);
  doc.text("Category: " + category, 20, 60);
  doc.text("Amount: €" + amount.toLocaleString(), 20, 70);
  doc.text("Reference: " + ref, 20, 80);
  doc.text("Date: " + date, 20, 90);

  doc.text("------------------------------", 20, 105);
  doc.text("Status: SUCCESS", 20, 115);
  doc.text("Thank you for banking with us", 20, 125);

  doc.save("DeChase_Receipt.pdf");
}

// BACK
function goHome(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
